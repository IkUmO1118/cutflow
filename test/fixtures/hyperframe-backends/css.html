<!doctype html>
<html><head><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui}
#card{display:grid;place-items:center;background:#102430;color:#fff}
#title{animation:rise 4s linear both}
@keyframes rise{from{transform:translateY(60px);opacity:0}to{transform:translateY(-20px);opacity:1}}
</style></head><body>
<main id="card" class="clip" data-composition-id="card" data-width="640" data-height="360" data-start="0" data-duration="4" data-hf-determinism="byte">
  <h1 id="title">CSS fixture</h1>
</main>
</body></html>
