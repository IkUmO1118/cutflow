<!doctype html>
<html data-composition-variables='[]'>
<head>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111f}
#root{position:relative;width:640px;height:360px;overflow:hidden}
#stage{display:block;width:640px;height:360px}
</style>
</head>
<body>
<div id="root" data-composition-id="root" data-width="640" data-height="360" data-hf-determinism="perceptual" data-hf-requires="three">
  <canvas id="stage" class="clip" data-start="0" data-duration="4" width="640" height="360"></canvas>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js" integrity="sha384-qOkzR5Ke/XkQxuGVJ9hpFEpDlcoLtWwVYhnJf06cLIZa2vaIptSqaubivErzmD5O" crossorigin="anonymous"></script>
<script>
if(THREE.REVISION!=='160')throw new Error('expected Three.js revision 160');
const DURATION_SEC = 4;
const canvas = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({canvas:canvas,antialias:false,preserveDrawingBuffer:true});
renderer.setPixelRatio(1);
renderer.setSize(640,360,false);
renderer.setClearColor(0x07111f,1);
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38,640/360,0.1,100);
camera.position.set(0,0,5);
const geometry = new THREE.IcosahedronGeometry(1.25,1);
const material = new THREE.MeshNormalMaterial({flatShading:true});
const mesh = new THREE.Mesh(geometry,material);
scene.add(mesh);
window.addEventListener('hf-seek',function(event){
  const time = Math.min(DURATION_SEC,Math.max(0,event.detail.time));
  mesh.rotation.x = time * 0.35;
  mesh.rotation.y = time * 0.8;
  mesh.scale.setScalar(0.88 + 0.12 * Math.sin(time * Math.PI / DURATION_SEC));
  renderer.render(scene,camera);
});
</script>
</body>
</html>
