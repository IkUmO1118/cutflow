<!doctype html>
<html><head><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden}
#card{background:#13261d}
#dot{animation:travel 4s linear both;transform-box:fill-box;transform-origin:center}
@keyframes travel{from{transform:translateX(0)}to{transform:translateX(420px)}}
</style></head><body>
<svg id="card" class="clip" data-composition-id="card" data-width="640" data-height="360" data-start="0" data-duration="4" data-hf-determinism="byte" viewBox="0 0 640 360">
  <rect width="640" height="360" fill="#13261d"/>
  <circle id="dot" cx="100" cy="180" r="38" fill="#e9c46a"/>
</svg>
</body></html>
