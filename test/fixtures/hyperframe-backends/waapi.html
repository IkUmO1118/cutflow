<!doctype html>
<html><head><style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:system-ui}
#card{display:grid;place-items:center;background:#f2f5f4;color:#102430}
#title{font-size:52px}
</style></head><body>
<main id="card" class="clip" data-composition-id="card" data-width="640" data-height="360" data-start="0" data-duration="4" data-hf-determinism="byte">

</main>
<script>document.getElementById('title').animate([{transform:'translateX(-120px)',opacity:0},{transform:'translateX(0)',opacity:1}],{duration:4000,fill:'both'});</script>
</body></html>
