<!doctype html>
<html>
<head><style>
  html,body{margin:0;padding:0}
  #root{position:relative;width:1920px;height:1080px;background:#0b0f1a;overflow:hidden;font-family:sans-serif}
  #box{position:absolute;top:440px;left:400px;width:200px;height:200px;background:#3b82f6;border-radius:12px;animation:noop 2s linear both;animation-play-state:paused}
  @keyframes noop{from{transform:translateX(0)}to{transform:translateX(0)}}
</style></head>
<body>
  <div id="root" data-composition-id="root" data-width="1920" data-height="1080">
    <div id="box" class="clip" data-start="0" data-duration="3"></div>
  </div>
</body>
</html>
