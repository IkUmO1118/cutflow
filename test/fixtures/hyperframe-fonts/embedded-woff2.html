  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#07111d}
  #root{position:relative;width:1280px;height:720px;overflow:hidden;
    display:grid;place-items:center;background:

  #card{width:980px;padding:72px 64px;border:1px solid rgba(120,231,255,.35);

    font-size:112px;font-weight:800;line-height:1.12;color:#f8fbff}

<body>
  <div id="root" data-composition-id="font-embedded-subset"
    data-width="1280" data-height="720" data-hf-determinism="byte">
    <section id="card" class="clip" data-start="0" data-duration="3">
      <div id="eyebrow">LOCAL · SUBSET · WOFF2</div>
      <h1 id="title"></h1>
      <div id="proof">CutFlow 0123456789</div>
    </section>
    <script>
      var v=window.__hyperframes.getVariables();
      var root=document.getElementById("root");
      document.getElementById("title").textContent=v.title;
      root.style.setProperty("--accent",v.accent);
      document.getElementById("card").animate(
        [{opacity:0,transform:"translateY(24px) scale(.98)"},
         {opacity:1,transform:"translateY(0) scale(1)"}],
        {duration:700,fill:"both",easing:"cubic-bezier(.2,.8,.2,1)"}
      );
    </script>
  </div>
</body>
