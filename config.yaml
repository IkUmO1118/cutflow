# cutflow 設定ファイル
# パスの ~ はホームディレクトリに展開されます

# 収録データの置き場所(リポジトリ外に置く。1収録=1フォルダ、中に raw.mkv)
recordingsDir: ~/Movies/cutflow

# 収録レイアウト(OBS拡張キャンバス方式)
# キャンバス 3840x1080: 左半分=画面キャプチャ、右半分=カメラ
# 収録設定を変えた場合はここを合わせる(docs/recording-guide.md 参照)
ingest:
  screenRegion: { x: 0, y: 0, w: 1920, h: 1080 }
  cameraRegion: { x: 1920, y: 0, w: 1920, h: 1080 }
  # OBSの音声トラック番号(1始まり)。トラック1=マイク、トラック2=システム音声
  # トラック2は任意。収録ファイルに存在しなければ自動的に無視される
  micTrack: 1
  systemTrack: 2
  # 収録レイアウトの既定。obs-canvas(拡張キャンバス、上の screenRegion/
  # cameraRegion を使う) / plain(通常動画。カメラ無し。screenRegion は
  # 全フレーム) / auto(キャンバス寸法が上の screenRegion+cameraRegion と
  # 完全一致すれば obs-canvas、それ以外は plain)。省略時 obs-canvas。
  # ingest / run の --layout フラグで実行時に上書きできる
  layout: obs-canvas

# 文字起こし(whisper.cpp)
whisper:
  bin: whisper-cli
  model: ~/Models/whisper/ggml-large-v3-turbo-q5_0.bin
  language: ja
  # 語/トークン単位のタイミング(transcript.json の segment.words[])を付けるか。
  # 省略時 false(既存挙動と完全一致。words を一切書かない)。
  # true にすると whisper 実行が -ojf に切り替わり transcript.json が増える
  # (今フェーズでは words[] を消費する機能が無いので既定は false のまま推奨)
  wordTimestamps: false

# 無音検出(機械的カットの候補づくり)
detect:
  # この音量(dB)以下が minSilenceSec 秒以上続いたら無音とみなす
  silenceDb: -35
  minSilenceSec: 0.7
  # カット時に前後へ残す余白(秒)。詰まりすぎた編集になるのを防ぐ
  padSec: 0.15
  # これより短い「残す区間」は断片(呼吸音等)とみなして捨てる(秒)
  minKeepSec: 0.5

# カット確認用プレビュー動画
preview:
  # 出力する横幅(px)。キャンバス全体を縮小するので確認には十分な小ささでよい
  width: 1280
  # proxy.mp4 / preview.mp4 のビデオエンコーダ。videotoolbox は macOS の
  # ハードウェアエンコーダ。生成時間はほぼ同等でファイルサイズが小さい。
  # libx264 で従来の ultrafast+CRF に戻せる(実測は docs/perf.md 参照)
  videoEncoder: videotoolbox

# 最終レンダー(Remotion 合成)のレイアウト
render:
  # 右下ワイプ(カメラ)の横幅(px、1920x1080基準)。ワイプは右下角に隙間なく配置される
  wipeWidthPx: 480
  # 字幕・テロップの画面端からの余白(px)。ワイプの位置には影響しない
  wipeMarginPx: 32
  # ワイプ全画面(overlays.json の wipeFull)の出入りの遷移時間(秒)。0で瞬時
  wipeTransitionSec: 0.3
  # カット境界(keep区間の継ぎ目)のトランジション。none で従来どおり瞬時切り替え。
  # dip-to-black で境界の前後に黒フェードを入れる(尺・音声は変わらない)。
  # sec は黒への往復の合計秒(前半でフェードアウト、後半でフェードイン)
  cutTransition:
    type: none
    sec: 0.3
  # 字幕のフォントサイズ(px)。初学者の見やすさ優先で大きめ
  captionFontSizePx: 52
  # テロップ既定の見た目(GUI エディタの設定画面 ⌘, からも変更できる)。
  # 個別のテロップ・トラック標準スタイルで指定の無い項目に効く
  captionColor: "#ffffff"
  captionOutlineColor: "#2563eb" # "none" で縁取りなし
  captionFontFamily: '"Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif'
  captionFontWeight: 700 # 100〜900
  # plan が章タイトルのテロップ(「章」トラック)を作るときの表示秒数
  chapterCardSec: 3
  # 音声ラウドネス正規化の目標値(LUFS)。YouTube の基準は -14
  # 収録音量が多少ばらついても、最終出力はこの音量に自動で揃う
  targetLufs: -14
  # システム音声(ingest.systemTrack で収録したアプリ音・デモ音)の扱い
  systemAudio:
    # true: 収録にシステム音声トラックがあればマイクと合成して出力に入れる
    # (render / preview / proxy 共通)。false: 従来どおりマイクのみ
    mix: true
    # 合成時のシステム音声の音量(dB)。0で原音量。合成後の全体が
    # targetLufs へ正規化されるので、ここでは声とのバランスだけを決める
    volumeDb: 0
  # マイク音声のノイズ除去(ffmpeg afftdn)。システム音声(アプリ音・デモ音)は
  # デジタル由来でノイズが無く、通すと音楽・効果音が劣化するため対象外
  denoise:
    # true でマイク音声にノイズ除去(ffmpeg afftdn)をかける。既定 false
    mic: false
    # afftdn のノイズフロア(dB)。下げるほど控えめ、上げるほど強い
    noiseFloorDb: -25
  # BGM。区間ごとに流すなら収録フォルダの bgm.json(tracks[]。区間・曲の
  # 切り替え・重奏ができる)。bgm.json が無ければ収録フォルダ直下の
  # bgm.mp3 / bgm.m4a / bgm.wav を全編1曲で流す(後方互換)。下の volumeDb /
  # fadeOutSec はその後方互換パスと、bgm.json で volumeDb 省略時の既定値
  bgm:
    # BGMの音量(dB)。0で原音量。声より20dB前後小さくするのが目安。
    # bgm.json の各区間で volumeDb を省いたときの既定にもなる
    volumeDb: -22
    # 全編1曲(後方互換)のときの動画終端フェードアウト秒数。
    # bgm.json では各区間の fadeOutSec で終端フェードを付ける
    fadeOutSec: 2
    # 発話中の自動ダッキング(無音検出 cuts.auto.json の発話区間で BGM を下げる)
    ducking:
      # 発話中にさらに下げる量(dB)。0 でダッキング無効
      duckDb: -8
      # 下げ・戻しにかける秒数
      fadeSec: 0.4
  # Remotion 合成段のハードウェアエンコーダ利用。if-possible: 使えれば使う
  # (macOS は VideoToolbox。使えない環境はソフトウェアへ自動フォールバック)。
  # disable: 常にソフトウェアエンコード(従来動作)。実測は docs/perf.md 参照
  hardwareAcceleration: if-possible
  # チャンク単位の差分レンダー(render chunk cache)。直前フルレンダー以降、
  # 映像に効く要素(テロップ・位置・ワイプ等)だけを変えた再実行で、変わった
  # チャンクだけを再レンダーして連結する。音声・keeps・全域設定を変えたときは
  # 自動でフルレンダーに戻る。chunkSec がチャンクの目標長(秒)。0 で無効。
  chunkSec: 15
  # ズーム演出(overlays.json の zooms)の既定設定。zooms[].easeSec で
  # 個別指定があればそちらが優先する
  zoom:
    # ズームイン/アウトの遷移秒数
    easeSec: 0.4

# 画面 OCR(frames --ocr)。AI が画面内テキスト(コード/ターミナル/エラー)を
# テキストとして読むための Apple Vision OCR 設定。macOS 専用・オフライン。
# frames --ocr を使わない限り一切走らない(既定挙動は完全に不変)
ocr:
  # 認識言語の優先順(Vision の recognitionLanguages)。開発画面は英語コードが
  # 主で日本語テロップ/コメントが混在するので en 優先・ja 併記
  languages: [en, ja]

# 常駐フレームサーバ(frames-serve コマンド)。省略可(既定 4311)。
# 有効化フラグはここには置かない(opt-in は frames-serve の明示起動で
# 担保する。ポートを変えたいときだけ使う)
# frames:
#   serve:
#     port: 4311

# GUI エディタ(npm run editor)
editor:
  # 素材アップロード1ファイルの上限(MB)。動画素材も置けるよう大きめ。
  # ローカル限定サーバーだが、暴走したアップロードでディスクを埋めない歯止め
  maxUploadMb: 2048
  # タイムラインに置く画像素材・尺不明素材の既定の尺(秒)
  defaultImageDurationSec: 4
  # ショート新規追加時、選択中の keep クリップもプレイヘッドも
  # 無いときの既定レンジ長(秒)
  defaultShortRangeSec: 10

# ショート動画の LLM ハイライト自動選定(plan-shorts コマンド)
planShorts:
  # 1本のショートの尺の上限(秒)。plan-shorts が LLM の選んだ区間集合の
  # 尺合計をこの値以下に収める(超過分は末尾の区間を落とす)。YouTube ショートは60秒
  maxDurationSec: 60

# plan(カット判断 LLM。plan / plan --cuts-only / remeta)へ発話以外の
# 知覚を添える(既定オフ。省略すれば導入前と完全にバイト等価)
# plan:
#   perception:
#     audio: true        # 無音・間の注記(決定論・追加依存なし。まずこれから)
#     ocr: false         # 画面OCRテキスト(macOS/Apple Vision 必要・区間数ぶん重い)
#     ocrMaxSegments: 40
#     ocrMaxLines: 6

# 意味カット・章立て・タイトル案の生成
llm:
  # claude-cli: Claude Code のサブスクで実行(APIキー不要)
  # api:        従量課金API(ANTHROPIC_API_KEY と model の指定が必要)
  backend: claude-cli
  model: ""
