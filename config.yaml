# cutflow 設定ファイル
# パスの ~ はホームディレクトリに展開されます

# 収録データの置き場所(リポジトリ外に置く。1収録=1フォルダ、中に raw.mkv)
recordingsDir: ~/Movies/cutflow

# 収録レイアウトの設定。既定は通常動画(plain)。
# OBS拡張キャンバスを使う場合は各コマンドで --layout obs-canvas を指定するか、
# この layout を obs-canvas に変える。
# キャンバス 3840x1080: 左半分=画面キャプチャ、右半分=カメラ
# 収録設定を変えた場合は screenRegion/cameraRegion を合わせる(docs/recording-guide.md 参照)
ingest:
  screenRegion: { x: 0, y: 0, w: 1920, h: 1080 }
  cameraRegion: { x: 1920, y: 0, w: 1920, h: 1080 }
  # OBSの音声トラック番号(1始まり)。トラック1=マイク、トラック2=システム音声
  # トラック2は任意。収録ファイルに存在しなければ自動的に無視される
  micTrack: 1
  systemTrack: 2
  # 収録レイアウトの既定。plain(通常動画。カメラ無し。screenRegion は
  # 全フレーム) / obs-canvas(拡張キャンバス、上の screenRegion/cameraRegion
  # を使う) / auto(寸法/縦横比から OBS らしければ obs-canvas、それ以外は plain)。
  # 省略時 plain。ingest / editor / run の --layout フラグで実行時に上書きできる
  layout: plain

# 文字起こし(whisper.cpp)
whisper:
  bin: whisper-cli
  model: ~/Models/whisper/ggml-large-v3-turbo-q5_0.bin
  language: ja
  # 語/トークン単位のタイミング(transcript.json の segment.words[])を付けるか。
  # 既定 true(語タイムスタンプは karaoke/語境界カットの前提資産=W0)。
  # true だと whisper 実行が -ojf に切り替わり transcript.json が増える。
  # 既存収録(words 無し)は再 transcribe が要る(validate が警告する)。
  # 明示的に false を書けば従来どおり words を一切書かない挙動に戻せる
  wordTimestamps: true
  # システム音声(systemTrack)も第2トラックとして文字起こしする(知覚専用・
  # 描画しない)。既定 false。true で transcript.system.json を書く
  systemAudio: false

# 無音検出(機械的カットの候補づくり)
detect:
  # この音量(dB)以下が minSilenceSec 秒以上続いたら無音とみなす
  silenceDb: -35
  minSilenceSec: 0.7
  # カット時に前後へ残す余白(秒)。詰まりすぎた編集になるのを防ぐ
  padSec: 0.15
  # これより短い「残す区間」は断片(呼吸音等)とみなして捨てる(秒)
  minKeepSec: 0.5

# カット確認用プレビュー動画
preview:
  # 出力する横幅(px)。キャンバス全体を縮小するので確認には十分な小ささでよい
  width: 1280
  # proxy.mp4 / preview.mp4 のビデオエンコーダ。videotoolbox は macOS の
  # ハードウェアエンコーダ。生成時間はほぼ同等でファイルサイズが小さい。
  # libx264 で従来の ultrafast+CRF に戻せる(実測は docs/perf.md 参照)
  videoEncoder: videotoolbox

# 最終レンダー(Remotion 合成)のレイアウト
render:
  # 右下ワイプ(カメラ)の横幅(px、1920x1080基準)。ワイプは右下角に隙間なく配置される
  wipeWidthPx: 480
  # 字幕・テロップの画面端からの余白(px)。ワイプの位置には影響しない
  wipeMarginPx: 32
  # ワイプ全画面(overlays.json の wipeFull)の出入りの遷移時間(秒)。0で瞬時
  wipeTransitionSec: 0.3
  # カット境界(keep区間の継ぎ目)のトランジション。none で従来どおり瞬時切り替え。
  # dip-to-black で境界の前後に黒フェードを入れる(尺・音声は変わらない)。
  # sec は黒への往復の合計秒(前半でフェードアウト、後半でフェードイン)
  cutTransition:
    type: none
    sec: 0.3
  # 字幕のフォントサイズ(px)。初学者の見やすさ優先で大きめ
  captionFontSizePx: 52
  # テロップ既定の見た目(GUI エディタの設定画面 ⌘, からも変更できる)。
  # 個別のテロップ・トラック標準スタイルで指定の無い項目に効く
  captionColor: "#ffffff"
  captionOutlineColor: "#2563eb" # "none" で縁取りなし
  captionFontFamily: '"Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif'
  captionFontWeight: 700 # 100〜900
  # plan が章タイトルのテロップ(「章」トラック)を作るときの表示秒数
  chapterCardSec: 3
  # 音声ラウドネス正規化の目標値(LUFS)。YouTube の基準は -14
  # 収録音量が多少ばらついても、最終出力はこの音量に自動で揃う
  targetLufs: -14
  # システム音声(ingest.systemTrack で収録したアプリ音・デモ音)の扱い
  systemAudio:
    # true: 収録にシステム音声トラックがあればマイクと合成して出力に入れる
    # (render / preview / proxy 共通)。false: 従来どおりマイクのみ
    mix: true
    # 合成時のシステム音声の音量(dB)。0で原音量。合成後の全体が
    # targetLufs へ正規化されるので、ここでは声とのバランスだけを決める
    volumeDb: 0
  # マイク音声のノイズ除去(ffmpeg afftdn)。システム音声(アプリ音・デモ音)は
  # デジタル由来でノイズが無く、通すと音楽・効果音が劣化するため対象外
  denoise:
    # true でマイク音声にノイズ除去(ffmpeg afftdn)をかける。既定 false
    mic: false
    # afftdn のノイズフロア(dB)。下げるほど控えめ、上げるほど強い
    noiseFloorDb: -25
  # BGM。区間ごとに流すなら収録フォルダの bgm.json(tracks[]。区間・曲の
  # 切り替え・重奏ができる)。bgm.json が無ければ収録フォルダ直下の
  # bgm.mp3 / bgm.m4a / bgm.wav を全編1曲で流す(後方互換)。下の volumeDb /
  # fadeOutSec はその後方互換パスと、bgm.json で volumeDb 省略時の既定値
  bgm:
    # BGMの音量(dB)。0で原音量。声より20dB前後小さくするのが目安。
    # bgm.json の各区間で volumeDb を省いたときの既定にもなる
    volumeDb: -22
    # 全編1曲(後方互換)のときの動画終端フェードアウト秒数。
    # bgm.json では各区間の fadeOutSec で終端フェードを付ける
    fadeOutSec: 2
    # 発話中の自動ダッキング(無音検出 cuts.auto.json の発話区間で BGM を下げる)
    ducking:
      # 発話中にさらに下げる量(dB)。0 でダッキング無効
      duckDb: -8
      # 下げ・戻しにかける秒数
      fadeSec: 0.4
  # Remotion 合成段のハードウェアエンコーダ利用。if-possible: 使えれば使う
  # (macOS は VideoToolbox。使えない環境はソフトウェアへ自動フォールバック)。
  # disable: 常にソフトウェアエンコード(従来動作)。実測は docs/perf.md 参照
  hardwareAcceleration: if-possible
  # チャンク単位の差分レンダー(render chunk cache)。直前フルレンダー以降、
  # 映像に効く要素(テロップ・位置・ワイプ等)だけを変えた再実行で、変わった
  # チャンクだけを再レンダーして連結する。音声・keeps・全域設定を変えたときは
  # 自動でフルレンダーに戻る。chunkSec がチャンクの目標長(秒)。0 で無効。
  chunkSec: 15
  # ズーム演出(overlays.json の zooms)の既定設定。zooms[].easeSec で
  # 個別指定があればそちらが優先する
  zoom:
    # ズームイン/アウトの遷移秒数
    easeSec: 0.4

# 画面 OCR(frames --ocr)。AI が画面内テキスト(コード/ターミナル/エラー)を
# テキストとして読むための Apple Vision OCR 設定。macOS 専用・オフライン。
# frames --ocr を使わない限り一切走らない(既定挙動は完全に不変)
ocr:
  # 認識言語の優先順(Vision の recognitionLanguages)。開発画面は英語コードが
  # 主で日本語テロップ/コメントが混在するので en 優先・ja 併記
  languages: [ en, ja ]

# 常駐フレームサーバ(frames-serve コマンド)。省略可(既定 4311)。
# 有効化フラグはここには置かない(opt-in は frames-serve の明示起動で
# 担保する。ポートを変えたいときだけ使う)
# frames:
#   serve:
#     port: 4311

# A/V フィードバック(av コマンド)。省略時はコード既定を使う
# av:
#   everySec: 5
#   cols: 5
#   windowSec: 1
#   scdetThreshold: 8
#   freeze:
#     noiseDb: -50
#     durationSec: 1
#   stripWidthPx: 320

# GUI エディタ(npm run editor)
editor:
  # 素材アップロード1ファイルの上限(MB)。動画素材も置けるよう大きめ。
  # ローカル限定サーバーだが、暴走したアップロードでディスクを埋めない歯止め
  maxUploadMb: 2048
  # タイムラインに置く画像素材・尺不明素材の既定の尺(秒)
  defaultImageDurationSec: 4
  # ショート新規追加時、選択中の keep クリップもプレイヘッドも
  # 無いときの既定レンジ長(秒)
  defaultShortRangeSec: 10
  aiReview:
    vlm: false
    maxImages: 4
    maxRefinements: 3

# ショート動画の LLM ハイライト自動選定(plan-shorts コマンド)
planShorts:
  # 1本のショートの尺の上限(秒)。plan-shorts が LLM の選んだ区間集合の
  # 尺合計をこの値以下に収める(超過分は末尾の区間を落とす)。YouTube ショートは60秒
  maxDurationSec: 60

# plan(カット判断 LLM。plan / plan --cuts-only / remeta)へ発話以外の
# 知覚を添える。標準設定では audio/ocr を明示オンにする。
# 古い config でこの節自体が無い場合は互換のため全オフで動き、CLI が警告する
plan:
  # カットの積極度: safe(現状維持=ほぼ切らない、X4導入前とバイト等価) /
  # balanced(既定・明確な冗長は切る) / aggressive(テンポ最優先)。
  # rules.md / brief.md に「編集モード: aggressive」等の行があればそちらが優先
  editMode: balanced
  perception:
    audio: true # 無音・間の注記(決定論・追加依存なし。まずこれから)
    ocr: true # 画面OCRテキスト(macOS/Apple Vision 必要・区間数ぶん重い)
    ocrMaxSegments: 40
    ocrMaxLines: 6
    systemSpeech: false # システム音声の発話を plan に添える(要 whisper.systemAudio)
  # plan --cuts-only の観測→再調整ループ。省略/0/1 は従来の1ショット。
  # targetOutDurationSec は単発 plan にも surface される(設定するとプロンプトに
  # 「目標の出力尺」行が1行足される。ループが無効でも読まれる)
  # loop:
  #   maxIterations: 0
  #   targetOutDurationSec: null
  #   stopWhenAssertionsPass: true

  # cut 判断を tool+検証ループのエージェントにする(H1/H2)。既定 false=
  # 従来の単発/pushループ経路とバイト等価。要 ai の structured route が
  # anthropic 等 completeAgentic 対応アダプタ(非対応なら警告のうえ自動フォールバック)
  # harness:
  #   agentic: false
  #   maxToolCalls: 16   # 1生成ターンあたりの tool 呼び出し上限
  #   applySplit: false  # SD5(H6): 確信区間だけ候補内部を語境界で分割(R0 突破)。要 agentic:true + wordTimestamps。
  #                      # 既定 false=候補単位(SD4)とバイト等価。分割は apply+validate/assert が安全網
  #   maxSplits: 4       # 1ターンの分割上限(確信区間のみ=全面 apply 移行はしない)
  #   tools:
  #     frames: true
  #     av: true
  #     materials: true
  #     ocr: true

  # describe の任意露出(既定オフ=散文/--json ともバイト等価)
  # describe:
  #   pauses: false      # keep 内の間の位置と長さを出す
  #   pauseMax: 3
  #   pauseMinSec: 0.6

# plan の候補格子を語タイムスタンプ(要 whisper.wordTimestamps)由来の語境界で
# 細分化する(C1)+ 候補テキストを実際に残る語だけにする(C8)。
# 既定 false=無音境界のみ(従来とバイト等価)。回帰基準線で on 比較してから既定化を検討
candidates:
  enabled: false
  splitOnlyLongerThanSec: 6 # これより長い候補だけを分割
  minSplitGapSec: 0.3       # 語間ギャップがこの秒以上なら分割点(無音検出が拾わない微小ポーズ)
  minCandidateSec: 0.5      # 分割後の最小尺(これ未満の断片は作らない)
  fillers: ["えー", "えっと", "あの", "あのー", "まあ", "その", "なんか"]

# 素材(B-roll)配置候補の自動生成(plan-materials)。要 materials <dir> --all の事前実行。
# 生成物は下書き(overlays[])で、採否は人間。cut/承認には触れない。
planMaterials:
  minSpanSec: 3.0        # 素材を置けるアンカーにする keep span の最小尺
  maxPlacements: 8       # 1回で作る overlay の上限(出しすぎ防止)
  defaultVolume: 0       # 素材音は既定で被せない(0=無音)
  defaultFit: contain
  # defaultRect: { x: 640, y: 40, w: 600, h: 338 }  # 省略=全画面。指定で PIP(ワイプ)

# 素材の尺整合・dangling 検出(material-fit)。要 materials <dir> の事前実行。
# 出力は apply パッチ下書き(material-fit.suggested.json)で、適用は人間が apply で行う。
materialFit:
  overrunEpsSec: 0.1        # 尺超過判定の許容誤差(秒)
  underrunRatio: 2.0        # 実尺が宣言尺の何倍で「大半未使用」とみなすか
  suggestUnderrunExtend: false  # 尺不足で延長 set を出すか(既定は reason のみ)
  maxReplacements: 3        # dangling 貼り替え候補の上限

# 演出(zoom/blur/annotation)候補の自動生成(plan-effects)。
# 要 frames --ocr / av の事前実行。生成物は下書きで、採否は人間。cut/承認に触れない。
planEffects:
  maxDecisions: 6          # 1回で作る演出の上限
  anchorWindowSec: 3.0     # アンカー時刻の前後に張る表示窓
  minSceneScore: 0.4       # motion アンカーにする sceneScore 下限
  minOcrBoxAreaPx: 8000    # OCR box をアンカーにする最小面積(小さい文字を除外)
  minZoomRect: { w: 480, h: 270 }  # zoom rect の最小サイズ(拡大しすぎ防止)
  defaultBlurStrength: 0.5

  # AI(意味カット・章立て・タイトル案・AI提案)
ai:
  # claude-code: Claude Code の `claude` CLI を使う(APIキー不要)
  # codex:       Codex CLI の `codex exec` を使う(実験的)
  # anthropic:   Anthropic API を使う(ANTHROPIC_API_KEY と model が必要)
  # openai:      OpenAI API を使う(OPENAI_API_KEY と model が必要)
  profiles:
    claude-code:
      adapter: claude-code
    cloud-vision:
      adapter: openai
      model: gpt-5.4-mini
  routes:
    text: claude-code
    structured: claude-code
    vision: cloud-vision
  # 旧形式(後方互換):
  # provider: codex
  # auto: CLI provider の既定モデル。API provider ではモデル名を明示する
  # model: gpt-5.4-mini
  #
  # 推奨の新形式(profiles + routes)。text/structured/vision を分けられる。
  # profiles:
  #   local:
  #     adapter: openai-compatible
  #     protocol: chat-completions
  #     baseUrl: http://127.0.0.1:11434/v1
  #     model: qwen-local
  #     auth: { type: none }
  #     capabilities:
  #       structuredOutput: json-object
  #       imageInput: false
  #   cloud-vision:
  #     adapter: openai
  #     model: gpt-5.4-mini
  # routes:
  #   text: local
  #   structured: local
  #   vision: cloud-vision
  #
  # 接続確認:
  #   node src/cli.ts ai doctor
  #   node src/cli.ts ai doctor --route vision
