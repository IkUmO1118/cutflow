<!doctype html>
<!-- Raw WebGPU reason: a time-driven per-pixel WGSL field is the intended visual. -->
<html data-composition-variables='[]'>
<head>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#06111f}
#root{position:relative;width:640px;height:360px;overflow:hidden}
#stage{display:block;width:640px;height:360px}
</style>
</head>
<body>
<div id="root" data-composition-id="root" data-width="640" data-height="360" data-hf-determinism="perceptual" data-hf-requires="webgpu">
  <canvas id="stage" class="clip" data-start="0" data-duration="4" width="640" height="360"></canvas>
</div>
<script>
const DURATION_SEC = 4;
const canvas = document.getElementById('stage');
let latestTime = 0;
let drawFrame = null;
window.addEventListener('hf-seek',function(event){
  latestTime = Math.min(DURATION_SEC,Math.max(0,event.detail.time));
  if(drawFrame)drawFrame(latestTime);
});
window.__hyperframes.__ready = (async function(){
  if(!navigator.gpu)throw new Error('WebGPU is unavailable');
  const context = canvas.getContext('webgpu');
  if(!context)throw new Error('WebGPU canvas context is unavailable');
  const adapter = await navigator.gpu.requestAdapter();
  if(!adapter)throw new Error('WebGPU adapter is unavailable');
  const device = await adapter.requestDevice();
  device.lost.then(function(info){
    window.__hyperframes.__failed.push({
      message:'WebGPU device lost: '+(info.message||info.reason),
      fatal:true
    });
  });
  const format = navigator.gpu.getPreferredCanvasFormat();
  context.configure({device:device,format:format,alphaMode:'opaque'});
  const shaderModule = device.createShaderModule({code:`
struct Uniforms {
  time: f32,
  width: f32,
  height: f32,
  pad: f32,
}
@group(0) @binding(0) var<uniform> uniforms: Uniforms;

@vertex
fn vertexMain(@builtin(vertex_index) index: u32) -> @builtin(position) vec4f {
  let positions = array<vec2f,3>(
    vec2f(-1.0,-1.0),
    vec2f(3.0,-1.0),
    vec2f(-1.0,3.0)
  );
  return vec4f(positions[index],0.0,1.0);
}

@fragment
fn fragmentMain(@builtin(position) position: vec4f) -> @location(0) vec4f {
  let uv = position.xy / vec2f(uniforms.width,uniforms.height);
  let wave = 0.5 + 0.5 * sin(uniforms.time * 1.7 + uv.x * 8.0);
  return vec4f(0.05 + 0.3 * uv.x,0.12 + 0.55 * wave,0.35 + 0.45 * uv.y,1.0);
}
`});
  const compilationInfo = await shaderModule.getCompilationInfo();
  const compilationErrors = compilationInfo.messages.filter(function(message){
    return message.type === 'error';
  });
  if(compilationErrors.length>0){
    throw new Error('WGSL compilation failed: '+compilationErrors.map(function(message){return message.message;}).join('; '));
  }
  const pipeline = device.createRenderPipeline({
    layout:'auto',
    vertex:{module:shaderModule,entryPoint:'vertexMain'},
    fragment:{module:shaderModule,entryPoint:'fragmentMain',targets:[{format:format}]},
    primitive:{topology:'triangle-list'}
  });
  const uniformBuffer = device.createBuffer({
    size:16,
    usage:GPUBufferUsage.UNIFORM|GPUBufferUsage.COPY_DST
  });
  const bindGroup = device.createBindGroup({
    layout:pipeline.getBindGroupLayout(0),
    entries:[{binding:0,resource:{buffer:uniformBuffer}}]
  });
  drawFrame = function(time){
    device.queue.writeBuffer(uniformBuffer,0,new Float32Array([time,640,360,0]));
    const encoder = device.createCommandEncoder();
    const pass = encoder.beginRenderPass({
      colorAttachments:[{
        view:context.getCurrentTexture().createView(),
        clearValue:{r:0.024,g:0.067,b:0.122,a:1},
        loadOp:'clear',
        storeOp:'store'
      }]
    });
    pass.setPipeline(pipeline);
    pass.setBindGroup(0,bindGroup);
    pass.draw(3);
    pass.end();
    device.queue.submit([encoder.finish()]);
  };
  drawFrame(latestTime);
})();
</script>
</body>
</html>
