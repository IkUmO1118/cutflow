<!doctype html>
<!-- Anime.js is justified here because one compact seekable timeline coordinates the two bars and accent handoff. -->
<html data-composition-variables='[
  {"id":"title","type":"string","label":"Title","default":"A lighter timeline"}
]'>
<head>
  <style>
    html,body{margin:0;padding:0}
    #root{position:relative;width:1280px;height:720px;overflow:hidden;background:#0b1020;font-family:system-ui,sans-serif}
    #title{position:absolute;left:160px;top:170px;margin:0;color:#f8fafc;font-size:72px;font-weight:760;letter-spacing:-2px}
    .rail{position:absolute;left:160px;width:880px;height:28px;border-radius:14px;background:#1e293b;overflow:hidden}
    #rail1{top:340px}#rail2{top:420px}
    .fill{width:100%;height:100%;border-radius:14px;transform:translateX(-100%)}
    #fill1{background:#38bdf8}#fill2{background:#a78bfa}
    #accent{position:absolute;left:160px;top:510px;width:120px;height:12px;border-radius:6px;background:#f59e0b;opacity:0}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js" integrity="sha384-oLmuahJgYYR1aWgZwdMQQ2AClE6A2eEwV2x1Z7cbIHehfkkmommQLH3wX1NDEszb" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root" data-composition-id="root" data-width="1280" data-height="720" data-hf-requires="anime">
    <h1 id="title" class="clip" data-start="0" data-duration="4"></h1>
    <div id="rail1" class="rail clip" data-start="0" data-duration="4"><div id="fill1" class="fill"></div></div>
    <div id="rail2" class="rail clip" data-start="0" data-duration="4"><div id="fill2" class="fill"></div></div>
    <div id="accent" class="clip" data-start="0" data-duration="4"></div>
    <script>
      var values = window.__hyperframes.getVariables();
      document.getElementById('title').textContent = values.title;
      var timeline = anime.timeline({autoplay:false,easing:'easeOutCubic'});
      timeline.add({targets:'#fill1',translateX:['-100%','0%'],duration:900})
        .add({targets:'#fill2',translateX:['-100%','0%'],duration:900},350)
        .add({targets:'#accent',opacity:[0,1],translateX:[0,760],duration:1200},1100);
      window.__hfAnime = window.__hfAnime || [];
      window.__hfAnime.push(timeline);
    </script>
  </div>
</body>
</html>
